<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nous contacter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <a href="index.html">Accueil</a>
        <a href="projects.html">Projets</a>
        <a href="contact.htmls">Contact</a>
    </div>
    <h1 style="padding-top: 80px; text-align: center;">Nous contacter</h1>
    <form action="" method="post" style="max-width: 400px; margin: 0 auto;">
        <label for="name">Nom:</label><br>
        <input type="text" id="name" name="name" required style="width: 100%; padding: 8px; margin-bottom: 10px;"><br>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required style="width: 100%; padding: 8px; margin-bottom: 10px;"><br>
        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="5" required style="width: 100%; padding: 8px; margin-bottom: 10px;"></textarea><br>
        <button type="submit" style="padding: 10px 20px; background-color: #080050; color: white; border: none; border-radius: 5px;">Envoyer</button>
    </form>
    <script></script>
</body>
</html>
